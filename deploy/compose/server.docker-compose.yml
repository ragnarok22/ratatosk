# Ratatosk Relay Server - Docker Compose
# Deploy on a public VPS with wildcard DNS (*.tunnel.example.com)
#
# Usage:
#   cp .env.example .env    # Edit with your domain and TLS settings
#   docker compose -f server.docker-compose.yml up -d

services:
  ratatosk-server:
    image: ghcr.io/ragnarok22/ratatosk-server:latest
    container_name: ratatosk-server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "${RATATOSK_CONTROL_PORT:-7000}:7000"
      - "${RATATOSK_PUBLIC_PORT:-8080}:8080"
      - "${RATATOSK_ADMIN_PORT:-8081}:8081"
    environment:
      - RATATOSK_BASE_DOMAIN=${RATATOSK_BASE_DOMAIN:-localhost}
      - RATATOSK_PUBLIC_PORT=${RATATOSK_PUBLIC_PORT:-8080}
      - RATATOSK_ADMIN_PORT=${RATATOSK_ADMIN_PORT:-8081}
      - RATATOSK_CONTROL_PORT=${RATATOSK_CONTROL_PORT:-7000}
      - RATATOSK_TLS_ENABLED=${RATATOSK_TLS_ENABLED:-false}
      - RATATOSK_TLS_CERT_FILE=${RATATOSK_TLS_CERT_FILE:-}
      - RATATOSK_TLS_KEY_FILE=${RATATOSK_TLS_KEY_FILE:-}
      - RATATOSK_TLS_AUTO=${RATATOSK_TLS_AUTO:-false}
      - RATATOSK_TLS_EMAIL=${RATATOSK_TLS_EMAIL:-}
      - RATATOSK_TLS_PROVIDER=${RATATOSK_TLS_PROVIDER:-}
      - RATATOSK_TLS_API_TOKEN=${RATATOSK_TLS_API_TOKEN:-}
      - XDG_DATA_HOME=/data
    volumes:
      # Persistent storage for automatic TLS certificates (certmagic)
      - ratatosk-certs:/data/certmagic
      # Uncomment and adjust for manual TLS certificates (e.g., certbot)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # Uncomment to use a config file instead of env vars
      # - ./ratatosk.yaml:/etc/ratatosk/ratatosk.yaml:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

# CasaOS metadata
x-casaos:
  title:
    en_us: Ratatosk Tunnel Server
  description:
    en_us: Self-hosted reverse proxy and tunneling tool - relay server
  icon: https://raw.githubusercontent.com/ragnarok22/ratatosk/main/ratatosk-logo.png
  category: Network
  port_map: "8081"

volumes:
  ratatosk-certs:
