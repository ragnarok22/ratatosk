name: Documentation issue
description: Report missing, unclear, or incorrect documentation
title: "[Docs]: "
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      placeholder: What is wrong, unclear, or missing?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      placeholder: README.md, Quick Start section
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      placeholder: What should the docs say instead?
