name: Bug report
description: Report a reproducible problem in Ratatosk
title: "[Bug]: "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I can reproduce this on the latest code I tested.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: The server accepts the client connection, but dashboard traffic metrics never update.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the problem.
      placeholder: |
        1. Start the relay server with ...
        2. Connect the CLI client with ...
        3. Open the dashboard and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Dashboard traffic metrics should update when requests pass through the tunnel.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide a release version, branch name, or commit SHA if known.
      placeholder: main @ abc1234
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, Go version, Node version, and any relevant network or deployment details.
      placeholder: macOS 15 arm64, Go 1.26, Node 20, server running on a VPS behind nginx
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste anything that helps confirm the issue.
      render: shell

