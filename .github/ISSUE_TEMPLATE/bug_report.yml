name: Bug report
description: Report a reproducible problem in Ratatosk
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Bug
      placeholder: Describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main @ abc1234
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell

