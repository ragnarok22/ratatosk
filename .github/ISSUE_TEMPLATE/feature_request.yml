name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      placeholder: What would you like Ratatosk to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Add examples, screenshots, or constraints if helpful.

