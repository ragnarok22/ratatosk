name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: cmd/server/dashboard/package.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build Dashboard
        run: make build-dashboard

      - name: Run Tests
        run: make test

      - name: Build Server (linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o dist/ratatosk-server-linux-amd64 ./cmd/server

      - name: Build CLI Binaries
        run: |
          targets="linux/amd64 linux/arm64 linux/arm darwin/arm64 darwin/amd64 windows/amd64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="dist/ratatosk-cli-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${target} -> ${output}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o "$output" ./cmd/cli
          done

      - name: Package CLI Tarballs
        run: |
          for bin in dist/ratatosk-cli-*; do
            [ "$bin" = "dist/ratatosk-cli-windows-amd64.exe" ] && continue
            name=$(basename "$bin")
            cp "$bin" ratatosk
            chmod +x ratatosk
            tar -czf "dist/${name}.tar.gz" ratatosk
            rm ratatosk
          done

      - name: Prepare Deploy Artifacts
        run: |
          cp deploy/ratatosk.yaml.example dist/
          cp deploy/ratatosk.service dist/
          cp deploy/Dockerfile.server dist/
          cp deploy/Dockerfile.cli dist/
          cp deploy/compose/*.yml dist/
          cp deploy/compose/.env.example dist/

      - name: Generate Changelog
        id: changelog
        run: |
          # Find the previous tag to generate a changelog diff.
          prev_tag=$(git tag --sort=-v:refname | head -2 | tail -1)
          tag=${GITHUB_REF#refs/tags/}

          {
            echo "changelog<<CHANGELOG_EOF"
            if [ "$prev_tag" != "$tag" ] && [ -n "$prev_tag" ]; then
              echo "## What's Changed"
              echo ""
              git log --pretty=format:"- %s (%h)" "${prev_tag}..${tag}"
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${tag}"
            else
              echo "## Initial Release"
              echo ""
              git log --pretty=format:"- %s (%h)" "${tag}"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/ratatosk-server-linux-amd64
            dist/ratatosk-cli-linux-amd64
            dist/ratatosk-cli-linux-arm64
            dist/ratatosk-cli-linux-arm
            dist/ratatosk-cli-darwin-arm64
            dist/ratatosk-cli-darwin-amd64
            dist/ratatosk-cli-windows-amd64.exe
            dist/ratatosk-cli-linux-amd64.tar.gz
            dist/ratatosk-cli-linux-arm64.tar.gz
            dist/ratatosk-cli-linux-arm.tar.gz
            dist/ratatosk-cli-darwin-arm64.tar.gz
            dist/ratatosk-cli-darwin-amd64.tar.gz
            dist/ratatosk.yaml.example
            dist/ratatosk.service
            dist/Dockerfile.server
            dist/Dockerfile.cli
            dist/server.docker-compose.yml
            dist/client.docker-compose.yml
            dist/full-stack.docker-compose.yml
            dist/.env.example

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release tarballs
        run: |
          tag=${GITHUB_REF#refs/tags/}
          base_url="https://github.com/${{ github.repository }}/releases/download/${tag}"
          mkdir -p tarballs
          for name in ratatosk-cli-darwin-arm64 ratatosk-cli-darwin-amd64 ratatosk-cli-linux-amd64 ratatosk-cli-linux-arm64; do
            curl -fsSL "${base_url}/${name}.tar.gz" -o "tarballs/${name}.tar.gz"
          done

      - name: Calculate SHA256 hashes
        id: hashes
        run: |
          {
            echo "darwin_arm64=$(sha256sum tarballs/ratatosk-cli-darwin-arm64.tar.gz | awk '{print $1}')"
            echo "darwin_amd64=$(sha256sum tarballs/ratatosk-cli-darwin-amd64.tar.gz | awk '{print $1}')"
            echo "linux_amd64=$(sha256sum tarballs/ratatosk-cli-linux-amd64.tar.gz | awk '{print $1}')"
            echo "linux_arm64=$(sha256sum tarballs/ratatosk-cli-linux-arm64.tar.gz | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          tag=${GITHUB_REF#refs/tags/}
          version="${tag#v}"
          repo="${{ github.repository }}"
          owner="${{ github.repository_owner }}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${owner}/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/ratatosk.rb <<FORMULA
          class Ratatosk < Formula
            desc "Self-hosted, open-source alternative to ngrok"
            homepage "https://github.com/${repo}"
            version "${version}"
            license "GPL-3.0-or-later"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${repo}/releases/download/v#{version}/ratatosk-cli-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_arm64 }}"
              elsif Hardware::CPU.intel?
                url "https://github.com/${repo}/releases/download/v#{version}/ratatosk-cli-darwin-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${repo}/releases/download/v#{version}/ratatosk-cli-linux-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_arm64 }}"
              elsif Hardware::CPU.intel?
                url "https://github.com/${repo}/releases/download/v#{version}/ratatosk-cli-linux-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "ratatosk"
            end

            test do
              system "#{bin}/ratatosk", "version"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ratatosk.rb
          git commit -m "Update Ratatosk to ${tag}"
          git push origin main

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ratatosk-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract CLI metadata
        id: cli-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ratatosk-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.cli
          push: true
          tags: ${{ steps.cli-meta.outputs.tags }}
          labels: ${{ steps.cli-meta.outputs.labels }}
